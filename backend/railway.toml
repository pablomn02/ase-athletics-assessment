# Configuración opcional para el backend en Railway.
# Si usas Docker (recomendado), en Settings del servicio pon:
#   Root Directory: vacío   |   Dockerfile Path: backend/Dockerfile   |   Build Context: .
# Así el build ve backend/ y data/ y el Dockerfile puede copiarlos correctamente.

[build]
builder = "railpack"

[deploy]
startCommand = "node src/index.js"
healthcheckPath = "/health"
