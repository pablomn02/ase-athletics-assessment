services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_ase
      POSTGRES_PASSWORD: password_ase
      POSTGRES_DB: ase_athletics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_ase -d ase_athletics"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://user_ase:password_ase@db:5432/ase_athletics
      # En producción o entorno compartido: define JWT_SECRET en el sistema (export JWT_SECRET=tu_secreto)
      JWT_SECRET: ${JWT_SECRET:-ase_jwt_secret_docker}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: